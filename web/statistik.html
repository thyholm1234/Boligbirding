<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Statistik</title>
  <link rel="stylesheet" href="style.css?v=1.12.29">
  <script src="https://cdn.jsdelivr.net/npm/chart.js?v=1.12.29"></script>
</head>
<body>
  <div id="statistics-content">
    <h1>Statistik</h1>
    
    <div id="search-container" class="stats-search-grid">
      <div class="stats-search-item">
        <input type="text" id="obserkode-input" class="stats-search-input" placeholder="Søg efter observatør...">
      </div>
      <div class="stats-search-item">
        <button id="search-btn" class="stats-search-btn">Søg</button>
      </div>
      <div class="stats-search-item">
        <input type="text" id="compare-obserkode-input" class="stats-search-input" placeholder="Sammenlign med obserkode...">
      </div>
      <div class="stats-search-item">
        <button id="compare-btn" class="stats-search-btn">Sammenlign</button>
      </div>
      <div class="stats-search-item">
        <button id="clear-compare-btn" class="stats-search-btn">Fjern</button>
      </div>
    </div>
    <div id="compare-status" class="muted stats-search-status"></div>

    <div id="profile-header" class="card profile-card"></div>

    <div id="comparison-blockers" class="card profile-card" style="display:none; margin-bottom:1em;"></div>

  <div class="profile-chart-stack">
    <div class="card profile-card">
      <h3>Arter pr. år</h3>
      <div class="chart-wrap">
        <canvas id="chart-global" height="200"></canvas>
      </div>
    </div>
    <div class="card profile-card">
      <h3>Udvikling i sete arter (DK)</h3>
      <div class="chart-wrap">
        <canvas id="chart-global-dev" height="200"></canvas>
      </div>
    </div>
    <div class="card profile-card" id="year-card">
      <h3>DK-arter</h3>
      <div id="year-list"></div>
    </div>
    <div class="card profile-card">
      <h3>Matrikelarter pr. år</h3>
      <div class="chart-wrap">
        <canvas id="chart-matrikel" height="200"></canvas>
      </div>
    </div>
    <div class="card profile-card">
      <h3>Udvikling i sete matrikelarter</h3>
      <div class="chart-wrap">
        <canvas id="chart-matrikel-dev" height="200"></canvas>
      </div>
    </div>
    <div class="card profile-card" id="matrikel-year-card">
      <h3>Matrikelarter</h3>
      <div id="matrikel-year-list"></div>
    </div>
    <div class="card profile-card">
      <h3>Observationer pr. år</h3>
      <div class="chart-wrap">
        <canvas id="chart-obs" height="200"></canvas>
      </div>
    </div>
    <div class="card profile-card" id="lokalafdeling-overview-card" style="display:none;">
      <h3>Lokalafdeling oversigt</h3>
      <div style="display:flex;gap:0.5em;align-items:center;flex-wrap:wrap;margin-bottom:0.75em;">
        <label for="lokalafdeling-overview-select"><b>Lokalafdeling:</b></label>
        <select id="lokalafdeling-overview-select" style="min-width:220px;"></select>
      </div>
      <div id="lokalafdeling-overview-content"></div>
    </div>
    <div class="card profile-card" id="kommune-overview-card" style="display:none;">
      <h3>Kommune oversigt</h3>
      <div style="display:flex;gap:0.5em;align-items:center;flex-wrap:wrap;margin-bottom:0.75em;">
        <label for="kommune-overview-select"><b>Kommune:</b></label>
        <select id="kommune-overview-select" style="min-width:220px;"></select>
      </div>
      <div id="kommune-overview-content"></div>
    </div>
  </div>
  </div>

  <script type="module" src="./statistik.js?v=1.12.29"></script>
</body>
</html>
